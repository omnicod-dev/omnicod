name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck core
        run: bunx tsc -p packages/core/tsconfig.json --noEmit

      - name: Typecheck cli
        run: bunx tsc -p packages/cli/tsconfig.json --noEmit

      - name: Run core tests
        run: bun test packages/core/test/ --timeout 30000

      - name: Run cli tests
        run: bun test packages/cli/test/ --timeout 30000
