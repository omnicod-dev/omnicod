name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.3)"
        required: true
        default: "1.0.3"

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all platform binaries
        run: bun run scripts/build-all.ts

      - name: Smoke test (linux-x64)
        run: ./dist/omnicod-linux-x64 --version

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version $VERSION"
          for pkg in packages/omnicod packages/cli-linux-x64 packages/cli-linux-arm64 packages/cli-darwin-x64 packages/cli-darwin-arm64 packages/cli-win32-x64; do
            bun x json -I -f $pkg/package.json -e "this.version='$VERSION'"
          done
          bun x json -I -f packages/omnicod/package.json -e "
            Object.keys(this.optionalDependencies || {}).forEach(k => {
              this.optionalDependencies[k] = '$VERSION'
            })
          "

      - name: Publish platform packages
        run: |
          for pkg in cli-linux-x64 cli-linux-arm64 cli-darwin-x64 cli-darwin-arm64 cli-win32-x64; do
            echo "Publishing @omnicod/$pkg..."
            cd packages/$pkg
            npm publish --access public
            cd ../..
            sleep 5
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Give npm registry time to fully index the platform packages
      # before the wrapper package resolves its optionalDependencies.
      - name: Wait for npm registry
        run: sleep 30

      - name: Publish main package (with retry)
        run: |
          cd packages/omnicod
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            npm publish --access public && break
            if [ $attempt -lt 3 ]; then
              echo "Publish failed, retrying in 30s..."
              sleep 30
            else
              echo "All attempts failed."
              exit 1
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/omnicod-linux-x64
            dist/omnicod-linux-arm64
            dist/omnicod-darwin-x64
            dist/omnicod-darwin-arm64
            dist/omnicod-win32-x64.exe
          generate_release_notes: true
