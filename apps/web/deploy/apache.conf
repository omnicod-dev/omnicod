<VirtualHost *:80>
    ServerName omnicod.dev
    ServerAlias www.omnicod.dev

    # HTTP -> HTTPS redirect
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName omnicod.dev
    ServerAlias www.omnicod.dev

    # SSL (certbot bu satırları otomatik doldurur)
    # SSLEngine on
    # SSLCertificateFile     /etc/letsencrypt/live/omnicod.dev/fullchain.pem
    # SSLCertificateKeyFile  /etc/letsencrypt/live/omnicod.dev/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket desteği (Next.js HMR için)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Loglar
    ErrorLog  ${APACHE_LOG_DIR}/omnicod_error.log
    CustomLog ${APACHE_LOG_DIR}/omnicod_access.log combined
</VirtualHost>
